# For scheduled build + precompute, use workflow "Predictor analytics pipeline".
name: Build predictor analytics from Supabase

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install deps
        run: pip install -r github_actions/requirements.txt

      - name: Rebuild predictor_analytics_assets from card rows
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
        run: python github_actions/build_predictor_analytics_from_supabase.py
