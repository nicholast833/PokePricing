# Computes per-pack USD from TCGTracking / TCGCSV (+ optional TCGGO), then writes results to Supabase:
#   - pokemon_sets.metadata (tcgplayer_pack_price, pack_cost_* — Explorer / export)
#   - pokemon_set_pack_pricing (one row per set_code — queryable snapshot; run migration first)
#
# No artifact upload: the DB is the deliverable. Logs still print sidecar path from sync_pack_costs locally.
#
# One-time: run SQL in supabase/migrations/20260208120000_pokemon_set_pack_pricing.sql (Supabase SQL editor).
#
# Secrets: SUPABASE_URL + SUPABASE_SERVICE_ROLE_KEY (as SUPABASE_KEY). Optional: TCGPRO_API_KEY for TCGGO.
name: Poll pack costs (Supabase)

on:
  workflow_dispatch:
    inputs:
      prefer:
        description: "auto | single_pack | box_implied | etb_implied | tcggo"
        type: choice
        options:
          - auto
          - single_pack
          - box_implied
          - etb_implied
          - tcggo
        default: auto
      skip_supabase_push:
        description: "Export + sync JSON only; do not write Supabase"
        type: boolean
        default: false
      no_pricing_table:
        description: "Apply metadata only; skip pokemon_set_pack_pricing upsert (migration missing)"
        type: boolean
        default: false

jobs:
  pack_costs:
    runs-on: ubuntu-latest
    timeout-minutes: 120

    env:
      SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
      SUPABASE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
      TCGPRO_API_KEY: ${{ secrets.TCGPRO_API_KEY }}

    concurrency:
      group: poll-pack-costs
      cancel-in-progress: false

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: github_actions/requirements.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r github_actions/requirements.txt

      - name: Export → sync pack costs → apply to Supabase
        run: |
          set -euo pipefail
          EXTRA=
          if [ "${{ inputs.skip_supabase_push }}" = "true" ]; then
            EXTRA="--skip-supabase"
          fi
          PT=
          if [ "${{ inputs.no_pricing_table }}" = "true" ]; then
            PT="--no-pricing-table"
          fi
          python github_actions/poll_pack_costs_all_sets.py \
            --prefer "${{ inputs.prefer }}" \
            --tcggo-history-days 180 \
            ${EXTRA} \
            ${PT}
