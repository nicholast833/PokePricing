# Single entry point: rebuild predictor_analytics_assets from cards → precompute engine → optional disk→DB sidecar sync.
# Scheduled runs do build + precompute only (sync steps default off so repo JSON cannot overwrite freshly built rows).
#
# Secrets: SUPABASE_URL + SUPABASE_SERVICE_ROLE_KEY (and SUPABASE_KEY if your scripts expect it).
# Optional sync: PREDICTOR_ANALYTICS_JSON_DIR secret or tracked files under data/assets/.
# Scheduled ~3h after Daily PokePricing Data Sync so card rows are usually settled (UTC evening).
name: Predictor analytics pipeline

on:
  workflow_dispatch:
    inputs:
      seed_sidecars_from_repo:
        description: "First — sync_predictor_analytics_assets.py (local JSON → DB) before rebuild"
        type: boolean
        default: false
      upload_sidecars_after_build:
        description: "Last — sync again after precompute (can overwrite DB with older repo JSON)"
        type: boolean
        default: false
  schedule:
    - cron: "45 2 * * *"

jobs:
  pipeline:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: github_actions/requirements.txt

      - name: Install dependencies
        run: pip install -r github_actions/requirements.txt

      - name: Seed predictor sidecars from repo (optional)
        if: ${{ github.event_name == 'workflow_dispatch' && inputs.seed_sidecars_from_repo == true }}
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
          PREDICTOR_ANALYTICS_JSON_DIR: ${{ secrets.PREDICTOR_ANALYTICS_JSON_DIR }}
        run: python github_actions/sync_predictor_analytics_assets.py

      - name: Build predictor analytics from Supabase
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
        run: python github_actions/build_predictor_analytics_from_supabase.py

      - name: Precompute predictor engine
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: python github_actions/precompute_predictor_from_supabase.py

      - name: Upload predictor sidecars after build (optional)
        if: ${{ github.event_name == 'workflow_dispatch' && inputs.upload_sidecars_after_build == true }}
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
          PREDICTOR_ANALYTICS_JSON_DIR: ${{ secrets.PREDICTOR_ANALYTICS_JSON_DIR }}
        run: python github_actions/sync_predictor_analytics_assets.py
