name: Precompute predictor engine

on:
  workflow_dispatch: {}
  schedule:
    - cron: "35 6 * * *"
  workflow_run:
    workflows:
      - "Build predictor analytics from Supabase"
      - "Refresh TCGGO tracked top-25"
    types: [completed]

jobs:
  precompute:
    runs-on: ubuntu-latest
    if: ${{ github.event_name != 'workflow_run' || github.event.workflow_run.conclusion == 'success' }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: github_actions/requirements.txt

      - name: Install dependencies
        run: pip install -r github_actions/requirements.txt

      - name: Run precompute
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: python github_actions/precompute_predictor_from_supabase.py
