# Prefer the combined workflow "Poll Wizard + GemRate (tracked)" for scheduled Wizard+GemRate runs.
# Exports tracked cards from Supabase → pokemon_sets_data.json, re-fetches Pokémon Wizard card pages
# for each top_25_cards row, merges chart-derived 1Y history (market, low, mid, high, trend %),
# then writes Wizard fields back to pokemon_cards (metrics + price_history mirror).
#
# Secrets: SUPABASE_URL + SUPABASE_SERVICE_ROLE_KEY (injected as SUPABASE_KEY; same as daily-sync).
# Artifact: updated JSON + sync report. Does not git-commit.
name: Poll Wizard price history (all tracked cards)

on:
  workflow_dispatch:
    inputs:
      sleep:
        description: "Seconds to sleep between HTTP calls (increase if rate-limited)"
        type: string
        default: "0.2"
      max_sets:
        description: "Max sets to process (0 = all)"
        type: string
        default: "0"
      max_cards:
        description: "Max top-list card rows (0 = all; use small value for smoke tests)"
        type: string
        default: "0"
      no_checkpoint_every_set:
        description: "Write dataset only once at end (faster, easier to lose progress on cancel)"
        type: boolean
        default: false
      skip_supabase_push:
        description: "Export + poll only; do not write merged Wizard fields back to Supabase"
        type: boolean
        default: false
  # Full-catalog runs can take many hours; enable on a fork or after timing a dispatch run.
  # schedule:
  #   - cron: '0 11 * * 0'  # Weekly Sun 11:00 UTC

jobs:
  poll_wizard_price_history:
    runs-on: ubuntu-latest
    timeout-minutes: 360

    env:
      SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
      # Same as Daily PokePricing Data Sync: service role JWT in SUPABASE_KEY
      SUPABASE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}

    concurrency:
      group: poll-wizard-price-history-all-sets
      cancel-in-progress: false

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: github_actions/requirements.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r github_actions/requirements.txt

      - name: Export pokemon_sets_data.json from Supabase
        run: python github_actions/supabase_wizard_dataset_bridge.py export --output pokemon_sets_data.json

      - name: Poll all sets (top_25_cards → Wizard chart history)
        run: |
          set -euo pipefail
          EXTRA=
          if [ "${{ inputs.no_checkpoint_every_set }}" = "true" ]; then
            EXTRA=--no-checkpoint-every-set
          fi
          python github_actions/poll_wizard_tracked_cards_all_sets.py \
            --sleep "${{ inputs.sleep }}" \
            --max-sets "${{ inputs.max_sets }}" \
            --max-cards "${{ inputs.max_cards }}" \
            ${EXTRA}

      - name: Apply Wizard fields back to Supabase
        if: ${{ inputs.skip_supabase_push == false }}
        run: python github_actions/supabase_wizard_dataset_bridge.py apply-wizard --input pokemon_sets_data.json

      - name: Upload poll outputs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: wizard-price-history-poll-${{ github.run_id }}
          if-no-files-found: warn
          path: |
            pokemon_sets_data.json
            reports/pokemon_wizard_sync_skips.json
            reports/dataset-sidecars/pokemon_sets_data.json.pokemon_wizard_sync_report.json
