# Computes Collectrics-style leaderboards for tracked cards and upserts
# predictor_analytics_assets.explorer_trending_daily (read by Explorer index.html).
name: Explorer trending daily

on:
  workflow_dispatch: {}
  schedule:
    - cron: "25 7 * * *"

jobs:
  trending:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: github_actions/requirements.txt

      - name: Install dependencies
        run: pip install -r github_actions/requirements.txt

      - name: Build and upsert explorer_trending_daily
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: python github_actions/build_explorer_trending_from_supabase.py
