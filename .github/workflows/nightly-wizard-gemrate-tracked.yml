# Sequential: export → Wizard poll (tracked top lists) → Supabase → export → GemRate poll → Supabase.
# Replaces running "Poll Wizard price history" and "Poll GemRate" separately for the same goal.
#
# Secrets: SUPABASE_URL + SUPABASE_SERVICE_ROLE_KEY (as SUPABASE_KEY).
name: Poll Wizard + GemRate (tracked)

on:
  workflow_dispatch:
    inputs:
      sleep:
        description: "Seconds between Wizard HTTP calls"
        type: string
        default: "0.2"
      max_sets:
        description: "Max sets (0 = all)"
        type: string
        default: "0"
      max_cards:
        description: "Max top-list rows per set (0 = all)"
        type: string
        default: "0"
      no_checkpoint_every_set:
        description: "Wizard — write dataset only at end"
        type: boolean
        default: false
      skip_wizard_supabase_push:
        description: "Wizard — export + poll only (no apply-wizard)"
        type: boolean
        default: false
      sleep_sets:
        description: "Seconds between GemRate set scrapes"
        type: string
        default: "2"
      skip_gemrate_supabase_push:
        description: "GemRate — export + scrape only (no apply-gemrate)"
        type: boolean
        default: false
  schedule:
    - cron: "0 10 * * 3"

jobs:
  wizard_then_gemrate:
    runs-on: ubuntu-latest
    timeout-minutes: 720

    env:
      SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
      SUPABASE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
      WZ_SLEEP: ${{ github.event_name == 'workflow_dispatch' && inputs.sleep || '0.2' }}
      WZ_MAX_SETS: ${{ github.event_name == 'workflow_dispatch' && inputs.max_sets || '0' }}
      WZ_MAX_CARDS: ${{ github.event_name == 'workflow_dispatch' && inputs.max_cards || '0' }}
      GR_SLEEP_SETS: ${{ github.event_name == 'workflow_dispatch' && inputs.sleep_sets || '2' }}

    concurrency:
      group: nightly-wizard-gemrate-tracked
      cancel-in-progress: false

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: github_actions/requirements.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r github_actions/requirements.txt

      - name: Export pokemon_sets_data.json
        run: python github_actions/supabase_wizard_dataset_bridge.py export --output pokemon_sets_data.json

      - name: Poll Wizard (tracked cards)
        run: |
          set -euo pipefail
          EXTRA=
          if [ "${{ inputs.no_checkpoint_every_set }}" = "true" ]; then
            EXTRA=--no-checkpoint-every-set
          fi
          python github_actions/poll_wizard_tracked_cards_all_sets.py \
            --sleep "${WZ_SLEEP}" \
            --max-sets "${WZ_MAX_SETS}" \
            --max-cards "${WZ_MAX_CARDS}" \
            ${EXTRA}

      - name: Apply Wizard fields to Supabase
        if: ${{ github.event_name != 'workflow_dispatch' || inputs.skip_wizard_supabase_push != true }}
        run: python github_actions/supabase_wizard_dataset_bridge.py apply-wizard --input pokemon_sets_data.json

      - name: Re-export after Wizard (fresh DB snapshot for GemRate)
        run: python github_actions/supabase_wizard_dataset_bridge.py export --output pokemon_sets_data.json

      - name: Poll GemRate (tracked cards)
        run: |
          set -euo pipefail
          python github_actions/poll_gemrate_tracked_cards_all_sets.py \
            --sleep-sets "${GR_SLEEP_SETS}"

      - name: Apply GemRate fields to Supabase
        if: ${{ github.event_name != 'workflow_dispatch' || inputs.skip_gemrate_supabase_push != true }}
        run: python github_actions/supabase_wizard_dataset_bridge.py apply-gemrate --input pokemon_sets_data.json

      - name: Upload artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: wizard-gemrate-poll-${{ github.run_id }}
          if-no-files-found: warn
          path: |
            pokemon_sets_data.json
            reports/pokemon_wizard_sync_skips.json
            reports/dataset-sidecars/pokemon_sets_data.json.pokemon_wizard_sync_report.json
            reports/gemrate_scrape_skipped.txt
