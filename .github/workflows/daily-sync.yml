# run_daily_api_queue merges TCGGO daily points and appends eBay anonymous cohort history.
# Optional secrets/env: EBAY_LISTING_HASH_SALT (stable hashed listing ids); caps: TCGGO_MERGED_MAX_POINTS,
# WIZARD_MERGED_MAX_ROWS (Wizard merge on apply-wizard), EBAY_ANONYMOUS_HISTORY_MAX, EBAY_ACTIVE_PRICE_HISTORY_MAX.
# eBay Buy Browse (active listings): EBAY_BROWSE_LIMIT_PER_PAGE (default 200), EBAY_BROWSE_MAX_PAGES (default 5),
# EBAY_BROWSE_SNAPSHOTS_CAP (max price rows stored in card metrics JSON per fetch).
name: Daily PokePricing Data Sync

on:
  workflow_dispatch:
    inputs:
      skip_tcggo:
        description: "Skip TCGGO (TCGPro) fetches — keeps eBay Browse + Supabase queue updates only (saves daily API budget)"
        type: boolean
        default: false
      run_tcggo_tracked_top25_after:
        description: "After the queue, run refresh_tcggo_tracked_top25.py (~200 TCGPro calls); leave off to avoid stacking with a long sync"
        type: boolean
        default: false
  schedule:
    # 23:00 UTC ≈ 3:00 PM PST (UTC−8). GitHub cron is UTC-only; no DST label in Actions.
    - cron: "0 23 * * *"

jobs:
  sync_data:
    runs-on: ubuntu-latest

    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
      DAILY_SYNC_SKIP_TCGGO: ${{ github.event_name == 'workflow_dispatch' && inputs.skip_tcggo == true && '1' || '' }}

    concurrency:
      group: daily-sync
      cancel-in-progress: false

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f github_actions/requirements.txt ]; then pip install -r github_actions/requirements.txt; fi

      - name: Run Daily API Queue
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          TCGPRO_API_KEY: ${{ secrets.TCGPRO_API_KEY }}
          EBAY_APP_ID: ${{ secrets.EBAY_APP_ID }}
          EBAY_CERT_ID: ${{ secrets.EBAY_CERT_ID }}
          EBAY_DEV_ID: ${{ secrets.EBAY_DEV_ID }}
        run: |
          python github_actions/run_daily_api_queue.py

  tcggo_tracked_top25:
    needs: sync_data
    if: ${{ github.event_name == 'workflow_dispatch' && inputs.run_tcggo_tracked_top25_after == true }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: github_actions/requirements.txt

      - name: Install dependencies
        run: pip install -r github_actions/requirements.txt

      - name: Refresh per-set tracked ranks (TCGGO)
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          TCGPRO_API_KEY: ${{ secrets.TCGPRO_API_KEY }}
          TCGGO_TRACKED_TOP25_MAX_CALLS: "200"
          TCGGO_EPISODE_LIST_MAX_PAGES: "22"
        run: python github_actions/refresh_tcggo_tracked_top25.py
